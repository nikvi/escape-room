services:
  redis:
    image: redis:7-alpine
    container_name: escape_room_cache
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: escape_room_api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/code